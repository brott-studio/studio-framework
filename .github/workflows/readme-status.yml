name: readme-status

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: readme-status
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    if: github.actor != 'The Bott'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BROTT_STUDIO_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Regenerate README status block
        run: python3 scripts/update-readme-status.py

      - name: Open or update status PR if README changed
        env:
          GH_TOKEN: ${{ secrets.BROTT_STUDIO_PAT }}
          BRANCH: auto/readme-status-update
          BASE: main
          TITLE: "chore(readme): auto-update status block"
        run: |
          set -euo pipefail

          if git diff --quiet -- README.md; then
            echo "No README changes — nothing to commit."
            exit 0
          fi

          git config user.name  "The Bott"
          git config user.email "thebott@brott-studio.studio"

          cp README.md /tmp/readme.new
          git fetch origin "$BASE"
          git checkout -B "$BRANCH" "origin/$BASE"
          cp /tmp/readme.new README.md

          if git diff --quiet -- README.md; then
            echo "README is already current vs. base — nothing to PR."
            exit 0
          fi

          git add README.md
          git commit -m "${TITLE} [skip ci]"
          git push --force-with-lease origin "$BRANCH"

          existing_pr="$(gh pr list --head "$BRANCH" --base "$BASE" --state open --json number --jq '.[0].number' || true)"
          if [ -z "${existing_pr}" ]; then
            gh pr create \
              --base "$BASE" \
              --head "$BRANCH" \
              --title "$TITLE" \
              --body "$(printf '%s\n' 'Automated status-block refresh. See `.github/workflows/readme-status.yml`.' '' '- Generated by `scripts/update-readme-status.py`' '- Loop-guarded via `paths-ignore: [README.md]` on the push trigger' '- Committed as `The Bott` so downstream required checks trigger naturally' '- Auto-merge (squash) is enabled; PR will merge itself once required checks pass')"
            existing_pr="$(gh pr list --head "$BRANCH" --base "$BASE" --state open --json number --jq '.[0].number')"
            echo "Opened PR #${existing_pr}."
          else
            echo "Updated existing PR #${existing_pr}."
          fi

          gh pr merge "$existing_pr" --auto --squash || \
            echo "[warn] Failed to enable auto-merge on #${existing_pr} — manual merge may be required."
